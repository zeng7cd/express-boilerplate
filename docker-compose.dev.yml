version: '3.8'

services:
  # 开发环境数据库
  postgres:
    image: postgres:16-alpine
    container_name: express-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: express_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - dev-network

  # 开发环境 Redis
  redis:
    image: redis:7-alpine
    container_name: express-redis-dev
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - dev-network

  # pgAdmin（数据库管理工具）
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: express-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - dev-network

  # Redis Commander（Redis 管理工具）
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: express-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - dev-network

volumes:
  postgres_dev_data:
    driver: local

networks:
  dev-network:
    driver: bridge
